name: Deploy PTCG AI Battle Challenge

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up Python (adjust version if needed)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Run tests (optional, but recommended)
      - name: Run tests
        run: |
          pytest || echo "No tests found, skipping..."

      # Deploy step (example: to Hugging Face, Render, or any service)
      - name: Deploy application
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          echo "Starting deployment..."
          # Example: Hugging Face CLI
          # huggingface-cli upload ./ --repo ptcg-ai-battle --token $HF_TOKEN
          # Or custom deploy script
          python deploy.py
