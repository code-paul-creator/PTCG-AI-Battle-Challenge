name: Deploy PTCG AI Battle Challenge

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

          # Install pytest only if it's not already available
          python -m pip install pytest

      - name: Run tests
        run: |
          if [ -d tests ] || ls test_*.py >/dev/null 2>&1; then
            echo "Running tests..."
            python -m pytest
          else
            echo "No tests found. Skipping."
          fi

      - name: Deploy application
        if: github.ref == 'refs/heads/main'
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
        run: |
          echo "Starting deployment..."

          # ======================================================
          # Replace the line below with your actual deployment
          # command (examples: python deploy.py, vercel deploy,
          # firebase deploy, ssh ..., etc.)
          # ======================================================

          echo "Deployment completed successfully!"
