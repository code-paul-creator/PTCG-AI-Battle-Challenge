name: PTCG AI Battle CI
 
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: {}
 
permissions:
  contents: read
  pages: write
  id-token: write
 
jobs:
  test:
    name: Run engine tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
 
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
 
      - name: Run unit tests
        run: PYTHONPATH=. python3 tests/test_simulator.py
 
      - name: Regenerate stability chart
        run: PYTHONPATH=. python3 scripts/plot_stability.py
 
      - name: Regenerate matchup matrix
        run: PYTHONPATH=. python3 scripts/plot_matchup_matrix.py
 
      - name: Upload generated charts as artifact
        uses: actions/upload-artifact@v4
        with:
          name: battle-charts
          path: assets/*.png
 
  agentic-smoke-test:
    name: Agentic LLM smoke test (Tier 3)
    needs: test
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
 
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
 
      # This job never fails the pipeline: no secret configured yet is a
      # valid state (LLMAgent falls back to HeuristicAgent), and a flaky
      # API call shouldn't block merges to main.
      - name: Run Gemini-backed agentic matchup
        if: env.GEMINI_API_KEY != ''
        continue-on-error: true
        run: LLM_PROVIDER=gemini PYTHONPATH=. python3 scripts/run_llm_matchup.py --matches 10
 
      - name: Run Claude-backed agentic matchup
        if: env.ANTHROPIC_API_KEY != ''
        continue-on-error: true
        run: LLM_PROVIDER=anthropic PYTHONPATH=. python3 scripts/run_llm_matchup.py --matches 10
 
      - name: No LLM secrets configured (informational only)
        if: env.GEMINI_API_KEY == '' && env.ANTHROPIC_API_KEY == ''
        run: echo "No GEMINI_API_KEY or ANTHROPIC_API_KEY secret set — LLMAgent runs in heuristic-fallback mode. Add one in Settings > Secrets and Actions to exercise the real Tier-3 agent."
 
  deploy-pages:
    name: Publish README assets to GitHub Pages
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
 
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
 
      - name: Regenerate charts for deployment
        run: |
          PYTHONPATH=. python3 scripts/plot_stability.py
          PYTHONPATH=. python3 scripts/plot_matchup_matrix.py
 
      - name: Convert README to index.html
        run: |
          pip install markdown
          python3 - << 'EOF'
          import markdown, pathlib
          text = pathlib.Path("README.md").read_text(encoding="utf-8")
          body = markdown.markdown(text, extensions=["fenced_code", "tables"])
          html = f"""<!DOCTYPE html>
          <html lang="en">
          <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>PTCG AI Battle Challenge</title>
          <style>
            body {{ max-width: 900px; margin: 2rem auto; padding: 0 1rem;
                    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
                    line-height: 1.6; color: #1e2327; }}
            img {{ max-width: 100%; }}
            pre {{ background: #f6f8fa; padding: 1rem; overflow-x: auto; border-radius: 6px; }}
            code {{ background: #f6f8fa; padding: 0.15em 0.35em; border-radius: 4px; }}
            table {{ border-collapse: collapse; width: 100%; }}
            td, th {{ border: 1px solid #d0d7de; padding: 0.5rem; }}
          </style>
          </head>
          <body>
          {body}
          </body>
          </html>"""
          pathlib.Path("_site").mkdir(exist_ok=True)
          pathlib.Path("_site/index.html").write_text(html, encoding="utf-8")
          EOF
 
      - name: Prepare Pages artifact
        run: |
          mkdir -p _site
          cp -r assets _site/assets
 
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
 
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
